<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER // Weather</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body.dark-mode { --bg-color: #000000; --text-color: #ffffff; }
        
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            transition: background-color 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .section.visible { opacity: 1; transform: translateY(0); }

        #hero { font-size: 8rem; font-weight: 200; margin: 0; }
        .summary-text { font-size: 1.5rem; max-width: 600px; text-align: center; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; }
        input { background: none; border: none; font-size: 1.2rem; color: inherit; border-bottom: 1px solid currentColor; }
    </style>
</head>
<body>

    <nav>
        <input type="text" id="city-search" placeholder="City...">
        <button id="profile-btn">Profile</button>
    </nav>

    <main id="weather-container">
        <section class="section" id="current-view">
            <h1 id="hero">--°</h1>
            <p id="summary" class="summary-text">Search a city to view atmospheric telemetry.</p>
        </section>

        <section class="section" id="past-view">
            <h2>Historical Context</h2>
            <div id="past-data">Loading records...</div>
        </section>

        <section class="section" id="future-view">
            <h2>Future Trajectory</h2>
            <div id="future-data">Loading projections...</div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
