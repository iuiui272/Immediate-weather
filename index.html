<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --transition-speed: 0.8s;
        }
        body.dark-mode { --bg-color: #000000; --text-color: #ffffff; }
        body { background: var(--bg-color); color: var(--text-color); transition: background var(--transition-speed); font-family: -apple-system, sans-serif; }
        
        .fade-in { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        
        .temp-display { font-size: 5rem; font-weight: 200; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <input type="text" id="city-search" placeholder="Enter city">
        <div id="weather-content" class="fade-in">
            <h1 class="temp-display" id="temp">--°</h1>
            <p id="summary">Search for a city to begin.</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
