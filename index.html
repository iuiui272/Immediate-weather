<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Pro</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
        }
        
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .liquid-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 25s infinite ease-in-out;
        }
        .blob-0 { width: 400px; height: 400px; background: #00c6ff; top: 5%; left: -10%; }
        .blob-1 { width: 500px; height: 500px; background: #f77062; bottom: 5%; right: -10%; animation-delay: -12s; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(190%);
            -webkit-backdrop-filter: blur(25px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transform: translateZ(0);
            box-sizing: border-box;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: background 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.15); }

        button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }

        .main-display {
            text-align: center;
            margin-bottom: 2rem;
        }

        .glass-icon {
            width: 110px;
            height: 110px;
            margin: 0 auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            animation: pulse 4s infinite ease-in-out;
        }

        h2 { font-size: 3.5rem; margin: 0.5rem 0 0 0; font-weight: 300; }
        .status-text { color: var(--text-sub); margin: 4px 0 0 0; font-size: 1.1rem; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 1.5rem;
        }

        .metric-tile {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label { font-size: 0.85rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-value { font-size: 1.25rem; font-weight: 600; }

        .system-actions {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }
        #clear-btn {
            background: rgba(255, 75, 75, 0.15);
            border: 1px solid rgba(255, 75, 75, 0.25);
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 12px;
            width: 100%;
        }
        #clear-btn:hover { background: rgba(255, 75, 75, 0.25); }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -60px) scale(1.1); }
        }
        @keyframes pulse {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="liquid-blob blob-0"></div>
    <div class="liquid-blob blob-1"></div>

    <div class="glass-card" id="card">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Search global city...">
            <button id="search-btn">Go</button>
        </div>

        <div class="main-display">
            <svg class="glass-icon"><use href="#icon-weather-default"></use></svg>
            <h2 id="temp">--°C</h2>
            <p id="status" class="status-text">Enter a city to compile forecast models</p>
        </div>

        <div class="metrics-grid">
            <div class="metric-tile"><span class="metric-label">Feels Like</span><span class="metric-value" id="val-feels">--</span></div>
            <div class="metric-tile"><span class="metric-label">Precipitation</span><span class="metric-value" id="val-precip">--</span></div>
            <div class="metric-tile"><span class="metric-label">Humidity</span><span class="metric-value" id="val-humidity">--</span></div>
            <div class="metric-tile"><span class="metric-label">Pressure</span><span class="metric-value" id="val-pressure">--</span></div>
            <div class="metric-tile"><span class="metric-label">Visibility</span><span class="metric-value" id="val-visibility">--</span></div>
            <div class="metric-tile"><span class="metric-label">UV Index</span><span class="metric-value" id="val-uv">--</span></div>
        </div>

        <div class="system-actions">
            <button id="clear-btn">Purge Mesh Cache</button>
        </div>
    </div>

    <svg style="display: none;">
        <symbol id="icon-weather-default" viewBox="0 0 100 100">
            <circle cx="50" cy="45" r="20" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
            <path d="M25,65 a15,15 0 0,1 15,-15 a20,20 0 0,1 35,0 a15,15 0 0,1 5,30 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        </symbol>
    </svg>

    <script src="app.js"></script>
</body>
</html>
