<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Weather</title>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); }
        body { margin: 0; height: 100vh; background: #0f2027; display: flex; justify-content: center; align-items: center; color: white; font-family: system-ui, sans-serif; overflow: hidden; }
        .liquid-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; z-index: -1; animation: float 20s infinite ease-in-out; }
        .blob-0 { width: 300px; height: 300px; background: #00c6ff; top: 10%; left: 10%; }
        .blob-1 { width: 400px; height: 400px; background: #f77062; bottom: 10%; right: 10%; animation-delay: -10s; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        input { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px; color: white; width: 60%; margin-bottom: 10px; }
        button { background: rgba(255,255,255,0.2); border: none; border-radius: 12px; padding: 10px 15px; color: white; cursor: pointer; margin: 5px; }
        #clear-btn { background: rgba(255, 60, 60, 0.3); }
        .glass-icon { width: 80px; height: 80px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(50px, -50px); } }
    </style>
</head>
<body>
    <div class="liquid-blob blob-0"></div><div class="liquid-blob blob-1"></div>
    <div class="glass-card" id="card">
        <input type="text" id="city-input" placeholder="Enter city...">
        <button id="search-btn">Search</button>
        <svg class="glass-icon"><use href="#icon-storm"></use></svg>
        <h2 id="temp">--°C</h2>
        <p id="status">Search to begin</p>
        <button id="clear-btn">Clear All Data</button>
    </div>
    <svg style="display: none;"><symbol id="icon-storm" viewBox="0 0 100 100"><path d="M25,60 a20,20 0 0,1 0,-40 a24,24 0 0,1 48,0 a18,18 0 0,1 0,36 Z" fill="rgba(255,255,255,0.3)"/><path d="M50,45 L40,70 L60,65 L50,95" stroke="#FFD700" stroke-width="4" fill="none"/></symbol></svg>
    <script src="app.js"></script>
</body>
</html>
