<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        :root { --bg-color: #f2f2f7; --text-color: #000; }
        body { margin: 0; background: var(--bg-color); font-family: -apple-system, sans-serif; }
        
        /* Menu Overlay */
        #menu { position: fixed; right: -100%; top: 0; width: 80%; height: 100%; 
                background: rgba(255,255,255,0.8); backdrop-filter: blur(30px);
                transition: 0.4s ease; padding: 20px; z-index: 10; }
        #menu.open { right: 0; }
        
        /* Cards & Hero */
        .hero { padding: 60px 20px; text-align: center; }
        .menu-btn { position: fixed; top: 20px; right: 20px; z-index: 11; font-size: 1.5rem; border: none; background: none; }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleMenu()">≡</button>

    <div id="menu">
        <h2>Locations</h2>
        <input type="text" id="city-search" placeholder="Search city...">
        <ul id="results"></ul>
    </div>

    <main class="hero">
        <h1 id="city-display">Loading...</h1>
        <div id="temp-display" style="font-size: 4rem;">--°</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
