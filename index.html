<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Weather</title>
    <style>
        /* ... previous styles ... */
        .search-container { margin-bottom: 20px; }
        input { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); 
            border-radius: 12px; padding: 10px; color: white; width: 80%;
            backdrop-filter: blur(5px); outline: none;
        }
        button { 
            background: rgba(255,255,255,0.2); border: none; border-radius: 12px;
            padding: 10px; color: white; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="liquid-blob blob-0"></div><div class="liquid-blob blob-1"></div>
    <div class="glass-card" id="card">
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Enter city...">
            <button id="search-btn">Go</button>
        </div>
        <svg class="glass-icon"><use href="#icon-storm"></use></svg>
        <h2 id="temp">--°C</h2>
        <p id="status">Search to begin</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
